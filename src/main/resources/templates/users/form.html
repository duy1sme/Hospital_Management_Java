<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Form tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-3">
    <a href="/" class="navbar-brand text-decoration-none">🏥 Quản Lý Bệnh Viện</a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
    </form>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3" th:text="${title}">Form tài khoản</h4>

                    <form th:object="${user}"
                          th:action="${user.id == 0} ? @{/admin/users/add} : @{/admin/users/edit}"
                          method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:required="${user.id == 0}">
                            <small class="text-muted" th:if="${user.id != 0}">
                                Nếu không đổi mật khẩu thì để trống.
                            </small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Họ tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quyền</label>
                            <select th:field="*{role}" class="form-select">
                                <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                                <option value="ROLE_DOCTOR">ROLE_DOCTOR</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select th:field="*{enabled}" class="form-select">
                                <option value="true">Hoạt động</option>
                                <option value="false">Khóa</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary">Lưu</button>
                        <a href="/admin/users" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
