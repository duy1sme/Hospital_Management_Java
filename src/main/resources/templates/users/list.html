<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary px-3">
        <a href="/" class="navbar-brand text-decoration-none">🏥 Quản Lý Bệnh Viện</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">Đăng xuất</button>
        </form>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>🔑 Danh sách tài khoản</h4>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-secondary btn-sm">⬅ Quay lại trang chủ</a>
                <a href="/admin/users/add" class="btn btn-success">+ Thêm tài khoản</a>
            </div>
        </div>

        <form class="row mb-3" method="get" th:action="@{/admin/users}">
            <div class="col-md-4">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm username hoặc họ tên"
                    th:value="${keyword}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
            </div>
            <div class="col-md-2">
                <a href="/admin/users" class="btn btn-secondary w-100">Làm mới</a>
            </div>
        </form>

        <table class="table table-bordered table-hover">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Tên đăng nhập</th>
                    <th>Họ tên</th>
                    <th>Quyền</th>
                    <th>Trạng thái</th>
                    <th style="width: 160px;">Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.role}"></td>
                    <td>
                        <span th:if="${u.enabled}" class="badge bg-success">Hoạt động</span>
                        <span th:unless="${u.enabled}" class="badge bg-secondary">Khóa</span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/users/edit/' + ${u.id}}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{'/admin/users/delete/' + ${u.id}}" class="btn btn-danger btn-sm"
                            onclick="return confirm('Bạn có chắc muốn xóa tài khoản này?')">Xóa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6" class="text-center">Không có dữ liệu</td>
                </tr>
            </tbody>
        </table>


    </div>

</body>

</html>
