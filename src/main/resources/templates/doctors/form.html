<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa Bác sĩ</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        input[type="checkbox"] {
            margin-right: 10px;
        }

        .form-actions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        button, .btn {
            padding: 10px 20px;
            border: none;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-save {
            background: #27ae60;
        }

        .btn-cancel {
            background: #95a5a6;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 th:text="${doctor.id == 0 ? 'Thêm bác sĩ mới' : 'Cập nhật bác sĩ'}"></h2>

    <form th:action="${doctor.id == 0 ? '/doctors/add' : '/doctors/edit'}" th:object="${doctor}" method="post">
        
        <!-- Trường ẩn lưu ID nếu là sửa -->
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Họ tên:</label>
            <input type="text" th:field="*{fullName}" required>
        </div>

        <div class="form-group">
            <label>Chuyên khoa:</label>
            <input type="text" th:field="*{specialty}" required>
        </div>

        <div class="form-group">
            <label>Số điện thoại:</label>
            <input type="text" th:field="*{phone}" required>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" th:field="*{active}">
                Đang làm việc
            </label>
        </div>

        <div class="form-actions">
            <a class="btn btn-cancel" th:href="@{/doctors}">Quay lại</a>
            <button type="submit" class="btn btn-save">Lưu thông tin</button>
        </div>

    </form>

</div>

</body>
</html>
