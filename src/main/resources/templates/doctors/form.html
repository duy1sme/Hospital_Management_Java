<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa Bác sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-info px-3">
        <a class="navbar-brand" href="/">🏥 Quản Lý Bệnh Viện</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white">
                Xin chào, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0" th:text="${doctor.id == 0 ? 'Thêm bác sĩ mới' : 'Cập nhật bác sĩ'}"></h5>
                    </div>
                    <div class="card-body">
                        <form th:action="${doctor.id == 0 ? '/doctors/add' : '/doctors/edit'}" th:object="${doctor}"
                            method="post">

                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ tên:</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Chuyên khoa:</label>
                                <input type="text" th:field="*{specialty}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Số điện thoại:</label>
                                <input type="text" th:field="*{phone}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Email:</label>
                                <input type="email" th:field="*{email}" class="form-control">
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" th:field="*{active}" class="form-check-input" id="activeCheck">
                                <label class="form-check-label" for="activeCheck">Đang làm việc</label>
                            </div>

                            <div class="d-flex gap-2">
                                <a class="btn btn-secondary" th:href="@{/doctors}">⬅ Quay lại</a>
                                <button type="submit" class="btn btn-info text-white">💾 Lưu thông tin</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
