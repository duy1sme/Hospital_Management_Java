<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form bệnh nhân</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 9px;
            margin-top: 6px;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
        }

        .actions {
            margin-top: 20px;
        }

        button, .btn {
            padding: 10px 16px;
            border: none;
            background: #2980b9;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-back {
            background: #7f8c8d;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 th:text="${pageTitle}">Form bệnh nhân</h2>

    <form th:object="${patient}" method="post">

        <label>Họ tên</label>
        <input type="text" th:field="*{fullName}" required>

        <label>Ngày sinh</label>
        <input type="date" th:field="*{dateOfBirth}">

        <label>Giới tính</label>
        <select th:field="*{gender}">
            <option value="">-- Chọn giới tính --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
        </select>

        <label>Số điện thoại</label>
        <input type="text" th:field="*{phone}">

        <label>Địa chỉ</label>
        <textarea th:field="*{address}"></textarea>

        <div class="actions">
            <button type="submit">Lưu</button>
            <a class="btn btn-back" th:href="@{/patients}">Quay lại</a>
        </div>

    </form>

</div>

</body>
</html>
