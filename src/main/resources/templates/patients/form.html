<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form bệnh nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-success px-3">
        <a class="navbar-brand" href="/">🏥 Quản Lý Bệnh Viện</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white">
                Xin chào, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0" th:text="${pageTitle}">Form bệnh nhân</h5>
                    </div>
                    <div class="card-body">
                        <form th:object="${patient}" method="post">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ tên</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Ngày sinh</label>
                                <input type="date" th:field="*{dateOfBirth}" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Giới tính</label>
                                <select th:field="*{gender}" class="form-select">
                                    <option value="">-- Chọn giới tính --</option>
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Số điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Địa chỉ</label>
                                <textarea th:field="*{address}" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">💾 Lưu</button>
                                <a class="btn btn-secondary" th:href="@{/patients}">⬅ Quay lại</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
