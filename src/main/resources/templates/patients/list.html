<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Danh sách bệnh nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-success px-3">
        <a class="navbar-brand" href="/">🏥 Quản Lý Bệnh Viện</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white">
                Xin chào, <strong sec:authentication="name"></strong>
            </span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>👤 Danh sách Bệnh nhân</h4>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-secondary btn-sm">⬅ Quay lại trang chủ</a>
                <a th:href="@{/patients/add}" class="btn btn-success">+ Thêm bệnh nhân</a>
            </div>
        </div>

        <!-- Tìm kiếm -->
        <form th:action="@{/patients}" method="get" class="mb-3">
            <div class="input-group">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm theo tên hoặc SĐT"
                    th:value="${keyword}">
                <button class="btn btn-success">Tìm kiếm</button>
                <a href="/patients" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>

        <!-- Bảng danh sách -->
        <table class="table table-bordered table-hover">
            <thead class="table-success">
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Ngày sinh</th>
                    <th>Giới tính</th>
                    <th>SĐT</th>
                    <th>Địa chỉ</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${patients}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.fullName}"></td>
                    <td th:text="${p.dateOfBirth}"></td>
                    <td th:text="${p.gender}"></td>
                    <td th:text="${p.phone}"></td>
                    <td th:text="${p.address}"></td>
                    <td>
                        <a class="btn btn-warning btn-sm" th:href="@{/patients/edit/{id}(id=${p.id})}">Sửa</a>
                        <a class="btn btn-danger btn-sm" th:href="@{/patients/delete/{id}(id=${p.id})}"
                            onclick="return confirm('Bạn có chắc muốn xóa bệnh nhân này?')">
                            Xóa
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(patients)}">
                    <td colspan="7" class="text-center text-muted">Không có bệnh nhân nào</td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>
