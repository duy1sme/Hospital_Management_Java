<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách bệnh nhân</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        .container {
            width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button, .btn {
            padding: 9px 14px;
            border: none;
            background: #2980b9;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-add {
            background: #27ae60;
        }

        .btn-edit {
            background: #f39c12;
        }

        .btn-delete {
            background: #e74c3c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .empty {
            text-align: center;
            color: #777;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Danh sách bệnh nhân</h2>

    <div class="top-actions">
        <form th:action="@{/patients}" method="get">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên hoặc SĐT">
            <button type="submit">Tìm kiếm</button>
        </form>

        <a class="btn btn-add" th:href="@{/patients/add}">+ Thêm bệnh nhân</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Họ tên</th>
            <th>Ngày sinh</th>
            <th>Giới tính</th>
            <th>SĐT</th>
            <th>Địa chỉ</th>
            <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${patients}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.fullName}"></td>
            <td th:text="${p.dateOfBirth}"></td>
            <td th:text="${p.gender}"></td>
            <td th:text="${p.phone}"></td>
            <td th:text="${p.address}"></td>
            <td>
                <a class="btn btn-edit" th:href="@{/patients/edit/{id}(id=${p.id})}">Sửa</a>

                <a class="btn btn-delete"
                   th:href="@{/patients/delete/{id}(id=${p.id})}"
                   onclick="return confirm('Bạn có chắc muốn xóa bệnh nhân này?')">
                    Xóa
                </a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(patients)}">
            <td colspan="7" class="empty">Không có bệnh nhân nào</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
