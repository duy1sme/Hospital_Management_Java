<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đặt lịch khám</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-dark bg-primary px-3">
        <a class="navbar-brand" href="/">🏥 Bệnh Viện</a>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>📅 Đặt lịch khám mới</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/appointments/add}" th:object="${appointment}" method="post">

                            <div class="mb-3">
                                <label>Bệnh nhân *</label>
                                <select th:field="*{patientId}" class="form-select" required>
                                    <option value="">-- Chọn bệnh nhân --</option>
                                    <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.fullName}">
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Bác sĩ *</label>
                                <select th:field="*{doctorId}" class="form-select" required>
                                    <option value="">-- Chọn bác sĩ --</option>
                                    <option th:each="d : ${doctors}" th:value="${d.id}"
                                        th:text="${d.fullName} + ' — ' + ${d.specialty}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Ngày khám *</label>
                                <input type="date" th:field="*{appointmentDate}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label>Giờ khám *</label>
                                <select th:field="*{appointmentTime}" class="form-select" required>
                                    <option value="">-- Chọn giờ --</option>
                                    <option value="07:00">07:00</option>
                                    <option value="07:30">07:30</option>
                                    <option value="08:00">08:00</option>
                                    <option value="08:30">08:30</option>
                                    <option value="09:00">09:00</option>
                                    <option value="09:30">09:30</option>
                                    <option value="10:00">10:00</option>
                                    <option value="10:30">10:30</option>
                                    <option value="13:00">13:00</option>
                                    <option value="13:30">13:30</option>
                                    <option value="14:00">14:00</option>
                                    <option value="14:30">14:30</option>
                                    <option value="15:00">15:00</option>
                                    <option value="15:30">15:30</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label>Ghi chú / Triệu chứng</label>
                                <textarea th:field="*{note}" class="form-control" rows="3"
                                    placeholder="Mô tả triệu chứng..."></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-warning">
                                    📅 Đặt lịch
                                </button>
                                <a href="/appointments" class="btn btn-secondary">Hủy</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
