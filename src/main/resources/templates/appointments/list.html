<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lịch khám</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-dark bg-primary px-3">
        <a class="navbar-brand" href="/">🏥 Bệnh Viện</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
        </form>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>📅 Danh sách Lịch khám</h4>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-secondary btn-sm">⬅ Quay lại trang chủ</a>
                <a href="/appointments/add" class="btn btn-warning">+ Đặt lịch mới</a>
            </div>
        </div>

        <form th:action="@{/appointments}" method="get" class="mb-3">
            <div class="input-group">
                <input type="text" name="keyword" class="form-control"
                    placeholder="Tìm theo tên bệnh nhân, trạng thái..." th:value="${keyword}">
                <button class="btn btn-primary">Tìm</button>
                <a href="/appointments" class="btn btn-secondary">Xóa lọc</a>
            </div>
        </form>

        <table class="table table-bordered table-hover">
            <thead class="table-warning">
                <tr>
                    <th>STT</th>
                    <th>Bệnh nhân</th>
                    <th>Bác sĩ</th>
                    <th>Ngày khám</th>
                    <th>Giờ khám</th>
                    <th>Trạng thái</th>
                    <th>Ghi chú</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a, i : ${appointments}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${a.patientName}"></td>
                    <td th:text="${a.doctorName}"></td>
                    <td th:text="${a.appointmentDate}"></td>
                    <td th:text="${a.appointmentTime}"></td>
                    <td>

                        <span th:if="${a.status == 'Chờ xác nhận'}" class="badge bg-warning text-dark"
                            th:text="${a.status}"></span>
                        <span th:if="${a.status == 'Đã xác nhận'}" class="badge bg-primary"
                            th:text="${a.status}"></span>
                        <span th:if="${a.status == 'Hoàn thành'}" class="badge bg-success" th:text="${a.status}"></span>
                        <span th:if="${a.status == 'Đã hủy'}" class="badge bg-danger" th:text="${a.status}"></span>
                    </td>
                    <td th:text="${a.note}"></td>
                    <td>

                        <form th:action="@{/appointments/status/{id}(id=${a.id})}" method="post" class="d-inline">
                            <select name="status" class="form-select form-select-sm d-inline w-auto"
                                onchange="this.form.submit()">
                                <option value="Chờ xác nhận" th:selected="${a.status == 'Chờ xác nhận'}">Chờ xác nhận
                                </option>
                                <option value="Đã xác nhận" th:selected="${a.status == 'Đã xác nhận'}">Đã xác nhận
                                </option>
                                <option value="Hoàn thành" th:selected="${a.status == 'Hoàn thành'}">Hoàn thành</option>
                                <option value="Đã hủy" th:selected="${a.status == 'Đã hủy'}">Đã hủy</option>
                            </select>
                        </form>
                        <a th:href="@{/appointments/delete/{id}(id=${a.id})}" class="btn btn-danger btn-sm ms-1"
                            onclick="return confirm('Xác nhận xóa lịch hẹn này?')">Xóa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="8" class="text-center text-muted">Chưa có lịch hẹn nào</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
