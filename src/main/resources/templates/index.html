<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand">🏥 Quản Lý Bệnh Viện</span>

    <!-- Nút đăng xuất dùng form POST -->
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">
            Đăng xuất
        </button>
    </form>
</nav>

<div class="container mt-4">
    <h5>Xin chào! Chọn chức năng:</h5>
    <div class="row mt-3 g-3">
        <div class="col-md-4">
            <a href="/patients" class="btn btn-success w-100 py-3">
                👤 Quản lý Bệnh nhân
            </a>
        </div>
        <div class="col-md-4">
            <a href="/doctors" class="btn btn-info w-100 py-3 text-white">
                🩺 Quản lý Bác sĩ
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/users" class="btn btn-danger w-100 py-3">
                🔑 Quản lý Tài khoản
            </a>
        </div>
    </div>
</div>

</body>
</html>
