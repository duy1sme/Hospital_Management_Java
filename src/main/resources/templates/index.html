<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-primary px-3">

        <span class="navbar-brand">🏥 Quản Lý Bệnh Viện</span>
        <div class="d-flex align-items-center gap-3">

            <span class="text-white">
                Xin chào, <strong sec:authentication="name"></strong>
            </span>

            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-light btn-sm">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">

        <h5 class="mb-3">📊 Tổng quan hệ thống</h5>
        <div class="row g-3 mb-4">

            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body text-center">
                        <div style="font-size:2rem">👤</div>

                        <h3 th:text="${totalPatients}">0</h3>
                        <p class="mb-0">Tổng bệnh nhân</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-info">
                    <div class="card-body text-center">
                        <div style="font-size:2rem">🩺</div>
                        <h3 th:text="${totalDoctors}">0</h3>
                        <p class="mb-0">Tổng bác sĩ</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body text-center">
                        <div style="font-size:2rem">✅</div>
                        <h3 th:text="${activeDoctors}">0</h3>
                        <p class="mb-0">Bác sĩ đang làm</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-warning">
                    <div class="card-body text-center">
                        <div style="font-size:2rem">📅</div>
                        <h3 th:text="${totalAppointments}">0</h3>
                        <p class="mb-0">Lịch hẹn hôm nay</p>
                    </div>
                </div>
            </div>

        </div>

        <h5 class="mb-3">📋 Chức năng</h5>
        <div class="row g-3">

            <div class="col-md-3">
                <a href="/patients" class="btn btn-success w-100 py-3">
                    👤 Quản lý Bệnh nhân
                </a>
            </div>

            <div class="col-md-3">
                <a href="/doctors" class="btn btn-info w-100 py-3 text-white">
                    🩺 Quản lý Bác sĩ
                </a>
            </div>

            <div class="col-md-3">
                <a href="/appointments" class="btn btn-warning w-100 py-3">
                    📅 Đặt lịch khám
                </a>
            </div>

            <div class="col-md-3" sec:authorize="hasRole('ADMIN')">
                <a href="/admin/users" class="btn btn-danger w-100 py-3">
                    🔑 Quản lý Tài khoản
                </a>
            </div>

        </div>
    </div>

</body>

</html>
